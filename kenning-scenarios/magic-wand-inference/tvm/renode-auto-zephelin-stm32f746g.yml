platform:
  type: ZephyrPlatform
  parameters:
    name: stm32f746g_disco
    simulated: true
    enable_zephelin: true
    zpl_use_debug_server: false
    zephyr_build_path: ./build/

model_wrapper:
  type: PyTorchMagicWandModelWrapper
  parameters:
    model_path: kenning:///models/classification/magic_wand.pth

dataset:
  type: MagicWandDataset
  parameters:
    dataset_root: ./output/MagicWandDataset

optimizers:
  - type: TVMCompiler
    parameters:
      compiled_model_path: ./build/compiled-model-magic-wand.graph_data

runtime_builder:
  type: ZephyrRuntimeBuilder
  parameters:
    workspace: .
    run_west_update: false
    output_path: ./output
    extra_targets: [board-repl]
    extra_build_args:
      - "-DCONFIG_KENNING_TVM_MODEL_PRE_GEN=y"
