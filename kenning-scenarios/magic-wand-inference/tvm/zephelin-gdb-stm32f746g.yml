platform:
  type: ZephyrPlatform
  parameters:
    name: stm32f746g_disco
    simulated: false
    enable_zephelin_gdb: true
    zpl_use_debug_server: false
    uart_port: /tmp/uart

model_wrapper:
  type: PyTorchMagicWandModelWrapper
  parameters:
    model_path: kenning:///models/classification/magic_wand.pth

dataset:
  type: MagicWandDataset
  parameters:
    dataset_root: ./output/MagicWandDataset

optimizers:
  - type: TVMCompiler
    parameters:
      compiled_model_path: ./build/compiled-model-magic-wand.graph_data
