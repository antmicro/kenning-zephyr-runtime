manifest:
  remotes:
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos

    - name: apache
      url-base: https://github.com/apache

    - name: dmlc
      url-base: https://github.com/dmlc

  projects:
    - name: zephyr
      remote: zephyrproject-rtos
      revision: main
      import:
        path-allowlist:
          - modules/debug/*
          - modules/hal/*
          - modules/lib/*
          - modules/tee/tf-m/*

    - name: tflite-micro
      remote: zephyrproject-rtos
      revision: main

    - name: tvm
      remote: apache
      revision: main

    - name: dlpack
      remote: dmlc
      revision: main
