CONFIG_TRACING_BUFFER_SIZE=32
CONFIG_ZPL_TRACE_BACKEND_DEBUGGER=y
CONFIG_RAM_TRACING_BUFFER_SIZE=65536

# When using Kenning Protocol Tracing Backend (which sends traces through
# Kenning Protocol), we disable tracing of Kenning Protocol events, because it
# would generate infinite traces recursively. Here in GDB tracing we can enable
# it.
CONFIG_KENNING_ZEPHELIN_TRACE_PROTOCOL=y
CONFIG_KENNING_ZEPHELIN_TRACE_MESSAGES=y
